name: setup-system
description: Setup system dependencies and Rust toolchain for NodeGet
inputs:
  toolchain:
    description: Rust toolchain channel
    required: false
    default: nightly
  components:
    description: Rust components to install
    required: false
    default: clippy
  targets:
    description: Rust targets to install
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libssl-dev

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
